{% extends "base.html" %} {% block content %}
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<div class="max-w-6xl mx-auto h-[calc(100vh-140px)] flex flex-col gap-4">
  <div class="glass-card p-6 bg-white shrink-0 fade-in z-10">
    <div
      class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4"
    >
      <div>
        <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-3">
          <div class="p-2 bg-red-100 rounded-lg text-red-600 shadow-sm">
            <i data-lucide="map-pin" class="w-6 h-6"></i>
          </div>
          <span data-i18n="map_title">Nearby Care</span>
        </h2>
        <p class="text-slate-500 text-sm ml-1 mt-1">
          Showing <b>verified</b> hospitals & clinics (OpenStreetMap Data).
        </p>
      </div>

      <button
        onclick="getMyLocation()"
        id="btn-gps"
        class="bg-blue-50 text-blue-600 px-5 py-3 rounded-xl font-bold hover:bg-blue-100 flex items-center gap-2 transition border border-blue-200 shadow-sm"
      >
        <i data-lucide="navigation" class="w-4 h-4"></i>
        <span data-i18n="btn_gps">Use GPS</span>
      </button>
    </div>

    <div class="flex flex-col md:flex-row gap-3">
      <div class="relative flex-grow">
        <input
          id="d-spec"
          placeholder="Specialty (e.g. Dentist, Hospital)"
          class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition bg-slate-50 focus:bg-white"
        />
      </div>
      <div class="relative flex-grow">
        <input
          id="d-loc"
          placeholder="Searching near..."
          class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition bg-slate-50 focus:bg-white"
        />
      </div>
      <button
        onclick="findDocs()"
        id="search-btn"
        class="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold hover:shadow-lg hover:scale-105 transition flex items-center gap-2 justify-center"
      >
        <i data-lucide="search" class="w-4 h-4"></i>
        <span data-i18n="btn_search" style="color: white">Search</span>
      </button>
    </div>
  </div>

  <div
    class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow overflow-hidden fade-in"
  >
    <div
      class="lg:col-span-1 bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col overflow-hidden h-full"
    >
      <div class="p-4 border-b border-slate-100 bg-slate-50">
        <h3
          class="font-bold text-slate-600 text-xs uppercase tracking-wider flex items-center gap-2"
        >
          <i data-lucide="list" class="w-3 h-3"></i> Search Results
        </h3>
      </div>
      <div
        id="d-list"
        class="overflow-y-auto p-3 space-y-3 flex-grow scroll-smooth"
      >
        <div
          class="flex flex-col items-center justify-center h-full text-slate-400 text-center p-6 opacity-70"
        >
          <i data-lucide="map-pinned" class="w-12 h-12 mb-2 text-slate-200"></i>
          <p class="text-sm">Click 'Use GPS' to see nearby hospitals.</p>
        </div>
      </div>
    </div>

    <div
      class="lg:col-span-2 bg-slate-100 rounded-2xl border border-slate-200 shadow-inner overflow-hidden relative h-[500px] lg:h-auto z-0"
    >
      <div id="map" class="w-full h-full z-0"></div>
    </div>
  </div>

  <div
    id="booking-modal"
    class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center fade-in"
  >
    <div
      class="bg-white rounded-2xl shadow-2xl w-full max-w-md m-4 overflow-hidden"
    >
      <div class="bg-blue-600 p-4 flex justify-between items-center">
        <h3 class="text-white font-bold flex items-center gap-2">
          Book Appointment
        </h3>
        <button onclick="closeModal()" class="text-white/70 hover:text-white">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase"
            >Hospital Name</label
          >
          <input
            id="modal-doc-name"
            class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-bold mt-1"
            readonly
          />
        </div>
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase"
            >Date & Time</label
          >
          <input
            id="modal-date"
            type="datetime-local"
            class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 mt-1"
          />
        </div>
        <button
          onclick="confirmBooking()"
          class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg mt-2"
        >
          Confirm
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  let userLat = null;
  let userLon = null;
  let map = null;
  let markers = [];
  const uid = sessionStorage.getItem("token");

  // --- CUSTOM RED CROSS ICON (+) FOR HOSPITALS ---
  const hospitalIcon = L.divIcon({
    className: "custom-hospital-icon",
    html: `<div style="
        background-color: #ef4444; 
        width: 30px; 
        height: 30px; 
        border-radius: 50%; 
        border: 2px solid white; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        display: flex; 
        align-items: center; 
        justify-content: center; 
        color: white;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    </div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15],
    popupAnchor: [0, -20],
  });

  // --- CUSTOM BLUE PULSE ICON FOR USER ---
  const userIcon = L.divIcon({
    className: "user-location-icon",
    html: `<div style="
        background-color: #3b82f6; 
        width: 16px; 
        height: 16px; 
        border-radius: 50%; 
        border: 3px solid white; 
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.4);">
    </div>`,
    iconSize: [16, 16],
    iconAnchor: [8, 8],
    popupAnchor: [0, -10],
  });

  function initMap() {
    map = L.map("map").setView([20.5937, 78.9629], 5);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors",
    }).addTo(map);
  }
  initMap();

  function getMyLocation() {
    if (!navigator.geolocation) return alert("Geolocation not supported.");

    const btn = document.getElementById("btn-gps");
    btn.innerHTML = `Locating...`;

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;

        document.getElementById("d-loc").value = "Current Location";
        btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Found`;
        lucide.createIcons();

        // 1. Zoom to User
        map.setView([userLat, userLon], 14);

        // 2. Add Distinct "You" Marker
        L.marker([userLat, userLon], { icon: userIcon })
          .addTo(map)
          .bindPopup("<b>You are here</b>")
          .openPopup();

        // 3. Auto-Find Doctors
        findDocs();
      },
      (err) => {
        alert("GPS Failed.");
        btn.innerHTML = `Use GPS`;
      },
      { enableHighAccuracy: true }
    );
  }

  async function findDocs() {
    if (!userLat || !userLon) return alert("Please use GPS first.");

    const list = document.getElementById("d-list");
    list.innerHTML = `<div class="p-4 text-center text-slate-400">Loading...</div>`;

    // Clear old hospital markers only (keep user marker)
    markers.forEach((m) => map.removeLayer(m));
    markers = [];

    try {
      const res = await fetch("/doctors", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          specialty: document.getElementById("d-spec").value,
          lat: userLat,
          lon: userLon,
        }),
      });
      const data = await res.json();
      list.innerHTML = "";

      if (!data.result.length)
        list.innerHTML = `<div class="p-4 text-center">No results.</div>`;

      data.result.forEach((doc) => {
        // A. Sidebar List Item
        const div = document.createElement("div");
        div.className =
          "bg-white p-3 rounded-xl border border-slate-100 hover:border-red-300 hover:shadow-md transition cursor-pointer mb-2 flex justify-between items-center";
        div.innerHTML = `
                <div>
                    <h4 class="font-bold text-slate-800 text-sm">${doc.name}</h4>
                    <small class="text-slate-500 text-xs">${doc.address}</small>
                </div>
                <button class="bg-red-50 text-red-600 p-2 rounded-lg hover:bg-red-100"><i data-lucide="plus" class="w-4 h-4"></i></button>
            `;
        // Click list item -> Fly to map pin
        div.onclick = () => map.flyTo([doc.lat, doc.lon], 16);
        list.appendChild(div);

        // B. Add Red Cross Marker to Map
        if (doc.lat && doc.lon) {
          const marker = L.marker([doc.lat, doc.lon], {
            icon: hospitalIcon,
          }).addTo(map);

          // MAKE POPUP CLICKABLE
          const popupContent = `
                    <div style="text-align: center;">
                        <b style="color: #1e293b; font-size: 14px;">${doc.name}</b><br>
                        <span style="color: #64748b; font-size: 12px;">${doc.address}</span><br>
                        <button onclick="openBooking('${doc.name}')" 
                            style="margin-top: 8px; background: #2563eb; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">
                            Book Appointment
                        </button>
                    </div>
                `;
          marker.bindPopup(popupContent);
          markers.push(marker);
        }
      });
      lucide.createIcons();

      // Fit bounds to show all hospitals
      if (markers.length > 0) {
        const group = new L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
      }
    } catch (e) {
      console.error(e);
    }
  }

  // --- BOOKING ---
  function openBooking(name) {
    document.getElementById("modal-doc-name").value = name;
    document.getElementById("booking-modal").classList.remove("hidden");
  }
  function closeModal() {
    document.getElementById("booking-modal").classList.add("hidden");
  }
  async function confirmBooking() {
    // (Booking logic same as before...)
    alert("Appointment Request Sent!");
    closeModal();
  }

  const lang = localStorage.getItem("careai_lang") || "en-US";
  if (typeof changeLanguage === "function") changeLanguage(lang);
  lucide.createIcons();
</script>
{% endblock %}
